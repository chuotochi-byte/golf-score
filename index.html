  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ゴルフスコア v1</title>

  <!-- 起動直後に必要なグローバル関数（applyDormie / exportPDF / SW登録） -->
  <script src="js/00-bootstrap.js?v=2"></script>

  <!-- スタイル -->
  <link rel="stylesheet" href="css/base.css?v=2">
  <link rel="stylesheet" href="css/responsive.css?v=2">
</head>

<body>

<!-- カスタムモーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>
  <div class="wrap">
    <!-- 初期設定 -->
    <section id="setup" class="setup">
      <div class="row" style="margin-bottom:8px;">
        <label>日付 <input id="date" type="date"></label>
        <label>ゴルフ場
          <select id="courseSelect">
            <optgroup label="★よく行くコース">
              <option value="やさと">やさと</option>
              <option value="江戸崎東">江戸崎東</option>
              <option value="江戸崎南">江戸崎南</option>
            </optgroup>
            <optgroup label="その他のコース">
              <option value="グレンオークス">グレンオークス</option>
              <option value="笠間カントリー">笠間カントリー</option>
              <option value="出島">出島</option>
              <option value="オークヒルズ">オークヒルズ</option>
              <option value="阿見">阿見</option>
              <option value="ワンウェイ">ワンウェイ</option>
              <option value="サミット">サミット</option>
              <option value="霞台筑波">霞台筑波</option>
              <option value="霞台霞">霞台霞</option>
              <option value="石岡ウエスト">石岡ウエスト</option>
              <option value="オールドオーチャード">オールドオーチャード</option>
              <option value="おかだいら">おかだいら</option>
              <option value="イーグルレイク">イーグルレイク</option>
              <option value="成田ヒルズ">成田ヒルズ</option>
              <option value="石岡">石岡</option>
              <option value="茨城ゴルフ">茨城ゴルフ</option>
              <option value="成田東">成田東</option>
              <option value="豊里">豊里</option>
              <option value="長太郎">長太郎</option>
              <option value="マリア">マリア</option>
              <option value="サンヒルズ">サンヒルズ</option>
              <option value="南総">南総</option>
              <option value="金乃台">金乃台</option>
              <option value="京カントリー">京カントリー</option>
              <option value="土浦カントリー">土浦カントリー</option>
              <option value="富士カントリー笠間">富士カントリー笠間</option>
              <option value="笠間">笠間</option>
              <option value="東筑波">東筑波</option>
            </optgroup>
            <option value="">その他（自由入力）</option>
          </select>
        </label>
      </div>
      <!-- 27Hコース用ナイン選択（27Hコース選択時のみ表示） -->
      <div id="nineSelectWrap" class="row" style="margin-bottom:8px;display:none;">
        <label>OUT <select id="courseNineOut"></select></label>
        <label>IN  <select id="courseNineIn"></select></label>
      </div>
      <!-- その他選択時のゴルフ場名自由入力 -->
      <div id="courseOtherWrap" class="row" style="margin-bottom:8px;display:none;">
        <label>ゴルフ場名 <input id="courseOther" type="text" placeholder="例：○○GC"></label>
      </div>
      <div class="row nameBox" style="margin-bottom:8px;">
        <input id="n1" type="text" value="増">
        <input id="n2" type="text" value="幸">
        <input id="n3" type="text" value="牛">
        <input id="n4" type="text" value="M">
      </div>
      <div class="row" style="margin-bottom:8px;gap:12px;font-size:14px;">
        <label><input type="checkbox" id="gameOly" checked> オリンピック</label>
        <label><input type="checkbox" id="gameVegas" checked> ラスベガス</label>
        <label><input type="checkbox" id="gameMatch" checked> マッチ/チーム</label>
      </div>

      <div class="row">
        <button class="btn" id="finishSetup">初期設定 完了</button>
        <button class="btn" id="resetAll" title="全入力を消します">全リセット</button>
      </div>
    </section>

    <!-- メタ -->
    <div class="topline">
      <div class="meta" id="meta"></div>
      <div class="meta"><strong id="halfLabel">OUT</strong> <button class="btn" id="toggleHalf" style="padding:6px 10px;font-size:12px;">INへ切替</button></div>
    </div>

    <!-- タブ切替ボタン -->
    <div class="tabs" id="viewTabs">
      <button class="tab active" id="tabScore" onclick="switchTab('score')">スコア</button>
      <button class="tab" id="tabOly" onclick="switchTab('oly')">オリンピック</button>
      <button class="tab" id="tabVegas" onclick="switchTab('vegas')">ラスベガス</button>
      <button class="tab" id="tabMatch" onclick="switchTab('match')">マッチ/チーム</button>
      <button class="tab" id="tabSettle" onclick="switchTab('settle')">精算</button>
      <button class="tab" id="tabHistory" onclick="switchTab('history')">履歴</button>
    </div>

<!-- スコア -->
    <section id="viewScore">
      <div class="tableWrap scoreWrap">
        <table id="scoreTable" class="scrollTable scoreTable">
          <thead>
            <tr>
              <th class="sticky2 holeCol">打順</th>
              <th class="scoreCol"><input id="ord1" class="ordInput" type="text" inputmode="numeric" pattern="[0-9]*" value="" aria-label="打順(増)"></th>
              <th class="scoreCol"><input id="ord2" class="ordInput" type="text" inputmode="numeric" pattern="[0-9]*" value="" aria-label="打順(幸)"></th>
              <th class="scoreCol"><input id="ord3" class="ordInput" type="text" inputmode="numeric" pattern="[0-9]*" value="" aria-label="打順(牛)"></th>
